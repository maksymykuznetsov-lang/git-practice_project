<!doctype html>
<html>
  <head>
    <title>{{ title }}</title>
  </head>
  <body>
    <h1>Видалення статті</h1>
    <p>
      Ви дійсно хочете назавжди видалити статтю "<strong
        >{{ article.title }}</strong
      >"?
    </p>

    <form method="POST">
      {% csrf_token %}
      <button type="submit">Так, видалити назавжди</button>
    </form>

    <br />
    <a href="{% url 'article_detail' article.id %}">Ні, скасувати</a>
  </body>
</html>
