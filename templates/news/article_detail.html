<!doctype html>
<html>
  <head>
    <title>{{ title }}</title>
  </head>
  <body>
    <a href="{% url 'article_list' %}">&lt; Назад до всіх новин</a>
    <hr />

    <h1>{{ article.title }}</h1>
    <p><strong>Категорія:</strong> {{ article.category.name }}</p>
    <p><strong>Дата публікації:</strong> {{ article.created_at }}</p>

    <p>{{ article.content }}</p>

    <hr />
    <a href="{% url 'article_update' article.id %}">[Редагувати]</a> |
    <a href="{% url 'article_delete' article.id %}">[Видалити]</a>
  </body>
</html>
